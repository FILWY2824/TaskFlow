# TaskFlow — docker-compose 内部的 web 容器 nginx 配置
#
# 该配置对应 web/Dockerfile,服务由 compose 的内部网络解析 backend:8080。
# 仅 HTTP;TLS 由外层(宿主机 nginx / Caddy / Traefik / cloudflare)处理。

upstream taskflow_backend {
    # docker-compose 服务名 server,对应后端容器
    server server:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 1m;

    # SSE 长连接:不能 buffer
    location /ws/ {
        proxy_pass http://taskflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location /api/ {
        proxy_pass http://taskflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location = /healthz {
        proxy_pass http://taskflow_backend;
        access_log off;
    }

    root /usr/share/nginx/html;
    index index.html;

    # 长缓存的指纹资源
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # 入口 + Vue Router (history mode) 后备
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全 header
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
