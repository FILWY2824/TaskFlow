# TodoAlarm — 仅 HTTP 的开发 / 局域网测试配置
# 用法:复制到 /etc/nginx/sites-available/todoalarm.dev,ln -s 后 reload。
#       仅适合内网或本地测试。生产请用 todoalarm.conf(HTTPS)。

upstream todoalarm_backend_dev {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;        # 任意域名匹配

    client_max_body_size 1m;

    location /ws/ {
        proxy_pass http://todoalarm_backend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location /api/ {
        proxy_pass http://todoalarm_backend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location = /healthz {
        proxy_pass http://todoalarm_backend_dev;
        access_log off;
    }

    root /var/www/todoalarm;
    index index.html;
    location /assets/ {
        expires 7d;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
