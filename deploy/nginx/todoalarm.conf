# TaskFlow — 生产 nginx 反代配置
#
# 用途:由 deploy/scripts/install.sh 自动复制到 /etc/nginx/sites-available/todoalarm
#       certbot --nginx 会自动注入 ssl_certificate / ssl_certificate_key 行
#
# 请求路由(按规格 §13):
#   /                        -> /var/www/todoalarm 静态(Vue 单页)
#   /api/                    -> Go 后端 127.0.0.1:8080
#   /ws/                     -> Go SSE 长连接(special handling)
#   /api/telegram/webhook    -> 走 /api/ 路由,后端会校验 X-Telegram-Bot-Api-Secret-Token
#   /healthz                 -> Go 后端

upstream todoalarm_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

# HTTP -> HTTPS 跳转
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # certbot http-01 challenge 路径(certbot --nginx 会自动管理,无需手动改)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    # certbot 会注入下面两行(以及 ssl_protocols / ssl_ciphers 等):
    # ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # === 安全 header ===
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP:默认同源,api.telegram.org 不需要(后端代理),允许 WS 升级
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'" always;

    # 上传体积限制(JSON API,不需要太大)
    client_max_body_size 1m;

    # gzip 静态资源
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # === 1. SSE 长连接(必须放在 /api 之前,因为 /ws 也走 /api 反代逻辑会切流) ===
    location /ws/ {
        proxy_pass http://todoalarm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE 关键:关掉 buffering 与缓存,允许长 read
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        chunked_transfer_encoding off;
    }

    # === 2. 普通 API ===
    location /api/ {
        proxy_pass http://todoalarm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }

    # === 3. 健康检查 ===
    location = /healthz {
        proxy_pass http://todoalarm_backend;
        access_log off;
    }

    # === 4. Web 静态资源(SPA) ===
    root /var/www/todoalarm;
    index index.html;

    # 带哈希的资源(Vite 产物 assets/) -> 一年长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 其他文件 / SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        # SPA shell 不缓存,确保新版上线立刻生效
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
